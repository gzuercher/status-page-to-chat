# Default provider configuration.
#
# This file is bundled into the Docker image and used by every container
# instance unless CONFIG_PATH points to an alternative file. Adapt it to
# the services *you* care about — fork the repo or mount your own file.
#
# Schema and adapter docs: docs/CONFIGURATION.md, docs/ADAPTERS.md.

chatTarget: googleChat

providers:
  # --- Atlassian Statuspage ---
  - key: bitbucket
    displayName: Bitbucket
    adapter: atlassian-statuspage
    baseUrl: https://bitbucket.status.atlassian.com

  - key: bitwarden
    displayName: Bitwarden
    adapter: atlassian-statuspage
    baseUrl: https://status.bitwarden.com

  - key: bexio
    displayName: Bexio
    adapter: atlassian-statuspage
    baseUrl: https://www.bexio-status.com

  - key: webflow
    displayName: Webflow
    adapter: atlassian-statuspage
    baseUrl: https://status.webflow.com

  - key: digicert
    displayName: DigiCert
    adapter: atlassian-statuspage
    baseUrl: https://status.digicert.com

  - key: ninjaone
    displayName: NinjaOne
    adapter: atlassian-statuspage
    baseUrl: https://status.ninjaone.com

  - key: sucuri
    displayName: Sucuri
    adapter: atlassian-statuspage
    baseUrl: https://status.sucuri.net

  - key: smartrecruiters
    displayName: SmartRecruiters
    adapter: atlassian-statuspage
    baseUrl: https://status.smartrecruiters.com

  - key: retool
    displayName: Retool
    adapter: atlassian-statuspage
    baseUrl: https://status.retool.com

  - key: langdock
    displayName: Langdock
    adapter: atlassian-statuspage
    baseUrl: https://status.langdock.com

  - key: zendesk-helpcenter
    displayName: Zendesk Help Center
    adapter: atlassian-statuspage
    baseUrl: https://status.zendesk.com
    componentFilter: example-helpcenter     # placeholder — replace with your Zendesk subdomain

  - key: kaseya-itglue
    displayName: Kaseya IT Glue
    adapter: atlassian-statuspage
    baseUrl: https://status.kaseya.com
    componentFilter: IT Glue                # only the IT Glue product

  - key: gravityzone-bitdefender
    displayName: Bitdefender GravityZone
    adapter: atlassian-statuspage
    baseUrl: https://status.gravityzone.bitdefender.com
    componentFilter:                        # only the cloud instances actually used
      - cloudgz.gravityzone.bitdefender.com
      - cloud.gravityzone.bitdefender.com

  - key: figma
    displayName: Figma
    adapter: atlassian-statuspage
    baseUrl: https://status.figma.com
    # No componentFilter: only 3 generic components, all relevant.

  # --- Sophos: DEFERRED (see ROADMAP.md → "Later extensions") ---
  # status.sophos.com runs on Atlassian Statuspage but the operator has
  # disabled all machine-readable endpoints. /api/v2/*, /history.atom,
  # /history.rss and /history.json all respond HTTP 200 with a generic
  # 1034-byte 404 HTML page instead of JSON/Atom — even with a realistic
  # browser User-Agent. The atlassian-statuspage adapter therefore cannot
  # cover Sophos. Enable when (a) Sophos opens the JSON API, or (b) an
  # HTML-scraping adapter exists. Browser impersonation is rejected as
  # a workaround per docs/CONFIGURATION.md.
  # - key: sophos
  #   displayName: Sophos
  #   adapter: atlassian-statuspage   # or: html-scraping (future)
  #   baseUrl: https://status.sophos.com

  - key: claude
    displayName: Claude
    adapter: atlassian-statuspage
    baseUrl: https://status.claude.com
    componentFilter:                        # only the products actually used
      - claude.ai
      - Claude Code
      - api.anthropic.com

  # --- Google Workspace ---
  - key: google-workspace
    displayName: Google Workspace
    adapter: google-workspace

  # --- Metanet (RSS) ---
  - key: metanet
    displayName: Metanet
    adapter: metanet-rss

  # --- WEDOS ---
  - key: wedos
    displayName: WEDOS
    adapter: wedos-status-online
    baseUrl: https://wedos.status.online

  # --- GitHub Issues as a status tracker ---
  - key: onetimesecret
    displayName: Onetime Secret
    adapter: github-issues
    owner: onetimesecret
    repo: status
