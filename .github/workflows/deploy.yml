name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC-Federation braucht diese Permissions
permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: func-status-page-to-chat
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build und Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Nur Produktions-Dependencies fuer das Deployment-Paket behalten
      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: .

      - name: Logout
        run: az logout
        if: always()
